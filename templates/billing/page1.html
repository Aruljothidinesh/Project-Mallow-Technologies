{% if error %}
  <p style="color:red">{{ error }}</p>
{% endif %}

<form method="post">
  {% csrf_token %}

  {{ form.customer_email.label }} {{ form.customer_email }}

  <h3>Products</h3>
  <div id="product-container">
    <div>
      Product ID: <input type="text" name="product_1">
      Qty: <input type="number" name="quantity_1">
    </div>
  </div>

  <button type="button" onclick="addRow()">Add New</button>

  <h3>Denominations</h3>

  <table cellpadding="6" cellspacing="0" style="border-collapse:collapse; width:250px;">
    <tr>
      <th style="text-align:left;">Denomination</th>
      <th style="text-align:right;">Count</th>
    </tr>

    {% for d in denominations %}
    <tr>
      <td>{{ d }}</td>
      <td style="text-align:right;">
        <input type="number" name="denom_{{d}}" value="0" min="0" style="width:80px; text-align:right;">
      </td>
    </tr>
    {% endfor %}
  </table>

  <label><b>Cash paid by customer</b></label>
  <input type="number" name="paid_amount" id="paid_amount" readonly>
 

  
  <button type="submit" name="action" value="cancel">Cancel</button>
  <button type="submit" name="action" value="generate">Generate Bill</button>
</form>

<script>
let index = 2;
function addRow() {
  const container = document.getElementById("product-container");
  const div = document.createElement("div");
  div.innerHTML = `
    Product ID: <input type="text" name="product_${index}">
    Qty: <input type="number" name="quantity_${index}">
  `;
  container.appendChild(div);
  index++;
}

function calculatePaid() {
    let total = 0;
    const denoms = [500,200,100,50,20,10,5,2,1];

    denoms.forEach(d => {
        const field = document.querySelector(`input[name="denom_${d}"]`);
        const qty = field && field.value ? parseInt(field.value) : 0;
        total += d * qty;
    });

    document.getElementById("paid_amount").value = total;
}

document.querySelectorAll("input[name^='denom_']").forEach(input => {
    input.addEventListener("input", calculatePaid);
});

</script>
